apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-auth-db
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-auth-db
  template:
    metadata:
      labels:
        app: mongodb-auth-db
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mongodb
        image: mongo:6.0
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "12Gi"
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_PASSWORD
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: mongodb-auth-pvc
